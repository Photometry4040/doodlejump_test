<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>두들 점프 클론</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #f0f8ff; /* 파스텔 블루 */
    touch-action: none; /* 모바일 스크롤 방지 */
  }
  canvas {
    display: block;
  }
  #ui-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .btn {
    pointer-events: auto;
    padding: 18px 40px;
    font-size: 22px;
    font-weight: 900;
    color: white;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    border: 3px solid #fff;
    border-radius: 50px;
    box-shadow: 0 8px 15px rgba(255, 117, 140, 0.4), inset 0 -4px 0 rgba(0,0,0,0.15);
    cursor: pointer;
    margin-top: 30px;
    transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    animation: pulse 2s infinite;
  }
  .btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 20px rgba(255, 117, 140, 0.6), inset 0 -4px 0 rgba(0,0,0,0.15);
  }
  .btn:active {
    transform: translateY(2px) scale(0.98);
    box-shadow: 0 4px 8px rgba(255, 117, 140, 0.4), inset 0 -1px 0 rgba(0,0,0,0.15);
    animation: none;
  }
  @keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 117, 140, 0.4), inset 0 -4px 0 rgba(0,0,0,0.15); }
    50% { transform: scale(1.03); box-shadow: 0 12px 25px rgba(255, 117, 140, 0.6), inset 0 -4px 0 rgba(0,0,0,0.15); }
    100% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 117, 140, 0.4), inset 0 -4px 0 rgba(0,0,0,0.15); }
  }
  #score-display {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 24px;
    font-weight: bold;
    color: #333;
    font-family: 'Comic Sans MS', sans-serif;
    z-index: 10;
  }
  #game-over-text {
    font-size: 48px;
    font-weight: bold;
    color: #ff6b6b;
    font-family: 'Comic Sans MS', sans-serif;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    display: none;
    text-align: center;
  }
  #final-score {
    font-size: 24px;
    color: #333;
    margin-top: 10px;
  }
</style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="score-display">점수: 0</div>
  <div id="ui-layer">
    <div id="game-over-text">
      Game Over
      <div id="final-score"></div>
    </div>
    <button id="start-btn" class="btn">게임 시작 (센서 권한 허용)</button>
    <button id="restart-btn" class="btn" style="display: none;">다시 시작하기</button>
  </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const restartBtn = document.getElementById('restart-btn');
const gameOverText = document.getElementById('game-over-text');
const finalScoreText = document.getElementById('final-score');
const scoreDisplay = document.getElementById('score-display');

let width, height;
let player;
let platforms = [];
let score = 0;
let maxScore = 0;
let gameLoopId;
let isGameOver = false;
let isPlaying = false;
let currentLevel = 1;
let levelTexts = [];
let particles = [];
let isDying = false;
let gameOverTimer = 0;

// 파티클 클래스 (게임 오버 이펙트용)
class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 15;
    this.vy = (Math.random() - 0.5) * 15 - 5; // 위로 솟구치게
    this.radius = Math.random() * 6 + 2;
    this.color = color;
    this.life = 60 + Math.random() * 30; // 1~1.5초
    this.maxLife = this.life;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.4; // 중력
    this.life--;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life / this.maxLife;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// 레벨업 알림 텍스트 클래스
class LevelUpText {
  constructor(text) {
    this.text = text;
    this.life = 120;
    this.maxLife = 120;
    this.y = height / 2 + 50;
  }
  update() {
    this.life--;
    this.y -= 0.5;
  }
  draw() {
    ctx.save();
    let alpha = this.life > 20 ? 1 : this.life / 20;
    ctx.globalAlpha = alpha;
    ctx.font = `900 32px 'Comic Sans MS', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 6;
    ctx.strokeText(this.text, width / 2, this.y);
    ctx.fillText(this.text, width / 2, this.y);
    ctx.restore();
  }
}

// 입력 변수
let keys = { left: false, right: false };
let tilt = 0; // 자이로센서 gamma 값

// 화면 크기 맞춤
function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

// 안전한 roundRect 폴리필 (구형 브라우저 지원)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  }
}

// 플레이어 클래스
class Player {
  constructor() {
    this.radius = 15;
    this.x = width / 2;
    this.y = height - 100;
    this.vx = 0;
    this.vy = 0;
    this.gravity = 0.4;
    this.jumpStrength = -11;
    this.speed = 6;
    this.color = '#ff9999'; // 귀여운 파스텔 핑크
    this.frame = 0; // 애니메이션 프레임
    this.squishTimer = 0; // 착지/점프 시 찌그러짐 효과 타이머
  }

  update() {
    this.frame++;
    if (this.squishTimer > 0) this.squishTimer--;

    // 가로 이동 (키보드 우선, 없으면 자이로)
    if (keys.left) this.vx = -this.speed;
    else if (keys.right) this.vx = this.speed;
    else {
      this.vx = tilt * 0.3; // 자이로 민감도 조절
      if (this.vx > this.speed * 1.5) this.vx = this.speed * 1.5;
      if (this.vx < -this.speed * 1.5) this.vx = -this.speed * 1.5;
    }

    this.x += this.vx;

    // 화면 양끝 연결 (Wrap-around)
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;

    // 세로 이동 (중력 적용)
    this.vy += this.gravity;
    this.y += this.vy;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // 이동 방향에 따른 기울임 (좌우 이동 시 살짝 기울어짐)
    let tiltAngle = this.vx * 0.05;
    ctx.rotate(tiltAngle);

    // 스퀴시(착지/점프) 애니메이션 스케일 적용
    let sx = 1, sy = 1;
    if (this.squishTimer > 0) {
      // 15프레임 동안 찌그러졌다가 펴지는 효과
      let t = this.squishTimer / 15; // 1 -> 0
      sx = 1 + Math.cos(t * Math.PI * 1.5) * 0.3 * t;
      sy = 1 - Math.cos(t * Math.PI * 1.5) * 0.3 * t;
    } else {
      // 떨어질 때 약간 길어지고, 올라갈 때 약간 찌그러지는 기본 물리 스케일
      sy = 1 + Math.abs(this.vy) * 0.015;
      sx = 1 / sy;
    }
    ctx.scale(sx, sy);

    // 팔다리 그리기
    ctx.strokeStyle = '#ff7777';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';

    // 상태 분기
    let isJumping = this.vy < 0;

    // 왼쪽 팔
    ctx.beginPath();
    ctx.moveTo(-12, 0);
    if (isJumping) {
      ctx.lineTo(-20, -15 + Math.sin(this.frame * 0.2) * 5); // 위로 흔들기 (만세)
    } else {
      ctx.lineTo(-20, -5 + Math.sin(this.frame * 0.1) * 3); // 가만히/떨어질 때 균형 잡기
    }
    ctx.stroke();

    // 오른쪽 팔
    ctx.beginPath();
    ctx.moveTo(12, 0);
    if (isJumping) {
      ctx.lineTo(20, -15 + Math.cos(this.frame * 0.2) * 5); // 위로 흔들기 (만세)
    } else {
      ctx.lineTo(20, -5 + Math.cos(this.frame * 0.1) * 3); // 가만히/떨어질 때 균형 잡기
    }
    ctx.stroke();

    // 왼쪽 다리
    ctx.beginPath();
    ctx.moveTo(-6, 12);
    if (isJumping) {
      ctx.lineTo(-8, 22); // 점프 시 다리를 쭉 뻗음
    } else {
      ctx.lineTo(-12, 18); // 떨어질 때 다리를 굽힘 (착지 준비)
    }
    ctx.stroke();

    // 오른쪽 다리
    ctx.beginPath();
    ctx.moveTo(6, 12);
    if (isJumping) {
      ctx.lineTo(8, 22); // 점프 시 다리를 쭉 뻗음
    } else {
      ctx.lineTo(12, 18); // 떨어질 때 다리를 굽힘 (착지 준비)
    }
    ctx.stroke();

    // 몸통
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
    ctx.fill();
    
    // 귀여운 눈
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-6, -4, 5, 0, Math.PI * 2);
    ctx.arc(6, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    
    // 눈동자 (이동 방향에 따라 눈동자 위치 살짝 변경)
    let eyeOffsetX = this.vx * 0.2;
    if (eyeOffsetX > 2) eyeOffsetX = 2;
    if (eyeOffsetX < -2) eyeOffsetX = -2;

    // 떨어질 때는 눈동자가 아래를 향하도록, 뛸 때는 위를 향하도록
    let eyeOffsetY = isJumping ? -1 : 2;

    ctx.fillStyle = 'black';
    ctx.beginPath();
    ctx.arc(-6 + eyeOffsetX, -4 + eyeOffsetY, 2.5, 0, Math.PI * 2);
    ctx.arc(6 + eyeOffsetX, -4 + eyeOffsetY, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // 볼터치
    ctx.fillStyle = 'rgba(255, 100, 100, 0.5)';
    ctx.beginPath();
    ctx.arc(-10, 2, 3, 0, Math.PI * 2);
    ctx.arc(10, 2, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  jump() {
    this.vy = this.jumpStrength;
    this.squishTimer = 15; // 점프 시 스퀴시 애니메이션 트리거
  }
}

// 별 그리기 헬퍼 함수
function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
  let rot = Math.PI / 2 * 3;
  let x = cx;
  let y = cy;
  let step = Math.PI / spikes;

  ctx.beginPath();
  ctx.moveTo(cx, cy - outerRadius);
  for (let i = 0; i < spikes; i++) {
    x = cx + Math.cos(rot) * outerRadius;
    y = cy + Math.sin(rot) * outerRadius;
    ctx.lineTo(x, y);
    rot += step;

    x = cx + Math.cos(rot) * innerRadius;
    y = cy + Math.sin(rot) * innerRadius;
    ctx.lineTo(x, y);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerRadius);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// 발판 클래스
class Platform {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.height = 15;
    this.touched = false; // 밟았는지 여부 확인
    this.isBreaking = false; // 부서지는 중인지 여부
    this.vx = 0; // 가로 이동 속도
    
    // 무작위로 발판의 종류(크기, 색상, 장식) 결정
    const rand = Math.random();
    let pNormal = 0.5, pWide = 0.25, pSmall = 0.15, pStar = 0.1, pMoving = 0, pFragile = 0;
    
    // 레벨에 따른 발판 생성 확률 조정
    if (currentLevel === 1) {
      pNormal = 0.6; pWide = 0.4; pSmall = 0.0; pStar = 0.0; pMoving = 0.0; pFragile = 0.0;
    } else if (currentLevel === 2) {
      pNormal = 0.4; pWide = 0.2; pSmall = 0.3; pStar = 0.1; pMoving = 0.0; pFragile = 0.0;
    } else if (currentLevel === 3) {
      pNormal = 0.3; pWide = 0.0; pSmall = 0.3; pStar = 0.1; pMoving = 0.3; pFragile = 0.0;
    } else {
      pNormal = 0.1; pWide = 0.0; pSmall = 0.3; pStar = 0.1; pMoving = 0.3; pFragile = 0.2;
    }

    if (rand < pNormal) {
      this.type = 'normal';
      this.width = 60;
      this.color = '#a2d149'; // 파스텔 그린
      this.scoreValue = 100;
    } else if (rand < pNormal + pWide) {
      this.type = 'wide';
      this.width = 90;
      this.color = '#87CEFA'; // 라이트 스카이 블루 (넓은 발판)
      this.scoreValue = 50;
    } else if (rand < pNormal + pWide + pSmall) {
      this.type = 'small';
      this.width = 40;
      this.color = '#FFA07A'; // 라이트 살몬 (좁은 발판)
      this.scoreValue = 200;
    } else if (rand < pNormal + pWide + pSmall + pStar) {
      this.type = 'star';
      this.width = 70;
      this.color = '#DDA0DD'; // 플럼 (보라색 계열, 별 장식)
      this.scoreValue = 500;
    } else if (rand < pNormal + pWide + pSmall + pStar + pMoving) {
      this.type = 'moving';
      this.width = 60;
      this.color = '#00CED1'; // 다크 터콰이즈 (움직이는 발판)
      this.scoreValue = 300;
      this.vx = (Math.random() > 0.5 ? 1 : -1) * (1.5 + Math.random() * 1.5); // 좌우 이동 속도
    } else {
      this.type = 'fragile';
      this.width = 60;
      this.color = '#CD853F'; // 페루/브라운 (부서지는 발판)
      this.scoreValue = 150;
    }
  }

  update() {
    if (this.type === 'moving') {
      this.x += this.vx;
      // 화면 양끝에 닿으면 방향 전환
      if (this.x < 0 || this.x + this.width > width) {
        this.vx *= -1;
        this.x = Math.max(0, Math.min(this.x, width - this.width));
      }
    }
    if (this.isBreaking) {
      this.y += 8; // 밟으면 빠르게 아래로 떨어짐
    }
  }

  draw() {
    // 발판 기본 형태
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.roundRect(this.x, this.y, this.width, this.height, 7.5);
    ctx.fill();
    
    // 발판 하이라이트 (입체감)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.roundRect(this.x + 2, this.y + 2, this.width - 4, 4, 2);
    ctx.fill();

    // 발판 종류에 따른 장식 추가
    if (this.type === 'star') {
      // 양쪽에 귀여운 별 장식
      drawStar(ctx, this.x + 15, this.y + 7.5, 5, 5, 2.5, '#FFFACD');
      drawStar(ctx, this.x + this.width - 15, this.y + 7.5, 5, 5, 2.5, '#FFFACD');
    } else if (this.type === 'wide') {
      // 넓은 발판에는 구름/물결 느낌의 흰색 줄무늬 장식
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.roundRect(this.x + 20, this.y + 5, 12, 5, 2.5);
      ctx.roundRect(this.x + 40, this.y + 5, 12, 5, 2.5);
      ctx.roundRect(this.x + 60, this.y + 5, 12, 5, 2.5);
      ctx.fill();
    } else if (this.type === 'normal') {
      // 기본 발판에는 귀여운 도트 무늬
      ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      ctx.beginPath();
      ctx.arc(this.x + 15, this.y + 7.5, 2.5, 0, Math.PI * 2);
      ctx.arc(this.x + 30, this.y + 7.5, 2.5, 0, Math.PI * 2);
      ctx.arc(this.x + 45, this.y + 7.5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === 'moving') {
      // 움직이는 발판에는 좌우 화살표 장식
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('< >', this.x + this.width / 2, this.y + 11);
    } else if (this.type === 'fragile') {
      // 부서지는 발판에는 금이 간 자국
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(this.x + 20, this.y);
      ctx.lineTo(this.x + 25, this.y + 7);
      ctx.lineTo(this.x + 22, this.y + 15);
      ctx.stroke();
    }
  }
}

// 수학적 확률을 고려한 다음 발판 위치 계산 함수
function calculateNextPlatform(highestY, highestX) {
  // 1. 수직 간격(gap) 무작위 설정 (레벨별 난이도 적용)
  let minGap = 40, maxGap = 130, safeMarginRatio = 0.65;
  if (currentLevel === 1) {
    minGap = 40; maxGap = 80; safeMarginRatio = 0.5;
  } else if (currentLevel === 2) {
    minGap = 50; maxGap = 100; safeMarginRatio = 0.6;
  } else if (currentLevel === 3) {
    minGap = 70; maxGap = 120; safeMarginRatio = 0.7;
  } else {
    minGap = 90; maxGap = 140; safeMarginRatio = 0.8;
  }
  
  // 플레이어의 최대 점프 높이는 약 151px (vy=-11, gravity=0.4 기준)
  let gap = minGap + Math.random() * (maxGap - minGap);

  // 2. 해당 gap에서 체공 가능한 시간 계산 (2차 방정식 근의 공식 활용)
  // 0.2*t^2 - 11*t + gap = 0
  let timeInAir = (11 + Math.sqrt(121 - 0.8 * gap)) / 0.4;

  // 3. 체공 시간 동안 이동 가능한 최대 가로 거리 (speed = 6 기준)
  let maxHorizontalDist = timeInAir * 6;

  // 4. 난이도 조절: 최대 도달 거리의 일정 비율 이내로 제한하여 무조건 닿을 수 있게 안전 마진 확보
  let safeDist = maxHorizontalDist * safeMarginRatio;

  // 5. 다음 X 좌표 계산
  let dx = (Math.random() * (safeDist * 2)) - safeDist;
  let nextX = highestX + dx;

  // 6. 화면 밖으로 나가면 Wrap-around 및 화면 안쪽으로 Clamp 처리
  if (nextX < 0) nextX += width;
  if (nextX > width - 60) nextX -= width;
  nextX = Math.max(0, Math.min(nextX, width - 60));

  return { x: nextX, y: highestY - gap };
}

// 구름 클래스 (패럴랙스 스크롤링용)
class Cloud {
  constructor(x, y, scale, speedMultiplier, opacity) {
    this.x = x;
    this.y = y;
    this.scale = scale;
    this.speedMultiplier = speedMultiplier; // 패럴랙스 속도 비율 (발판보다 느리게 움직임)
    this.opacity = opacity;
  }

  draw() {
    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 20 * this.scale, Math.PI * 0.5, Math.PI * 1.5);
    ctx.arc(this.x + 15 * this.scale, this.y - 15 * this.scale, 20 * this.scale, Math.PI * 1, Math.PI * 2);
    ctx.arc(this.x + 35 * this.scale, this.y - 10 * this.scale, 25 * this.scale, Math.PI * 1, Math.PI * 2);
    ctx.arc(this.x + 55 * this.scale, this.y, 20 * this.scale, Math.PI * 1.5, Math.PI * 0.5);
    ctx.closePath();
    ctx.fill();
  }
}

let clouds = [];
let floatingTexts = []; // 떠오르는 점수 텍스트 배열

// 떠오르는 점수 텍스트 클래스
class FloatingText {
  constructor(x, y, value, customColor = null) {
    this.x = x;
    this.y = y;
    this.life = 40; // 텍스트가 표시될 프레임 수
    this.maxLife = 40;
    this.vy = -2; // 위로 떠오르는 속도
    
    if (typeof value === 'string') {
      this.text = value;
      this.scoreValue = 0;
      this.size = 30;
      this.color = customColor || '#FF0000';
    } else {
      this.text = `+${value}`;
      this.scoreValue = value;
      // 점수 크기에 따라 폰트 크기와 색상 다르게 설정
      if (value >= 500) {
        this.size = 36;
        this.color = '#FFD700'; // 골드 (별)
      } else if (value >= 200) {
        this.size = 28;
        this.color = '#FF6347'; // 토마토 (좁은 발판)
      } else if (value >= 100) {
        this.size = 22;
        this.color = '#32CD32'; // 라임그린 (기본)
      } else {
        this.size = 18;
        this.color = '#1E90FF'; // 도저블루 (넓은 발판)
      }
    }
  }

  update() {
    this.y += this.vy;
    this.life--;
  }

  draw() {
    ctx.save();
    let alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    
    // 깜빡이는 효과 (점수가 높을 때)
    if (this.scoreValue >= 200 && this.life % 10 < 5) {
      ctx.fillStyle = '#FFFFFF'; // 흰색으로 깜빡임
    } else {
      ctx.fillStyle = this.color;
    }
    
    ctx.font = `900 ${this.size}px 'Comic Sans MS', sans-serif`;
    ctx.textAlign = 'center';
    
    // 외곽선
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 4;
    ctx.strokeText(this.text, this.x, this.y);
    
    // 텍스트 채우기
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

let backgroundStars = [];

function initGame() {
  player = new Player();
  platforms = [];
  clouds = [];
  floatingTexts = [];
  levelTexts = [];
  particles = [];
  backgroundStars = [];
  score = 0;
  maxScore = 0;
  currentLevel = 1;
  isGameOver = false;
  isDying = false;
  gameOverTimer = 0;
  scoreDisplay.innerText = `점수: 0`;
  gameOverText.style.display = 'none';
  restartBtn.style.display = 'none';

  // 배경 별 초기화
  for (let i = 0; i < 80; i++) {
    backgroundStars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      radius: Math.random() * 1.5 + 0.5,
      alpha: Math.random(),
      alphaChange: (Math.random() * 0.02 + 0.01) * (Math.random() < 0.5 ? 1 : -1)
    });
  }

  // 초기 발판 생성
  let currentX = width / 2 - 30;
  let currentY = height - 20;
  platforms.push(new Platform(currentX, currentY)); // 시작 발판
  
  for (let i = 0; i < 15; i++) {
    let nextPos = calculateNextPlatform(currentY, currentX);
    platforms.push(new Platform(nextPos.x, nextPos.y));
    currentX = nextPos.x;
    currentY = nextPos.y;
  }

  // 초기 구름 생성
  for (let i = 0; i < 6; i++) {
    clouds.push(new Cloud(
      Math.random() * width,
      Math.random() * height,
      0.6 + Math.random() * 0.8, // 크기
      0.1 + Math.random() * 0.3, // 속도 비율 (0.1 ~ 0.4)
      0.4 + Math.random() * 0.4  // 투명도
    ));
  }
}

function checkLevelUp() {
  let newLevel = 1;
  if (maxScore >= 10000) newLevel = 4;
  else if (maxScore >= 5000) newLevel = 3;
  else if (maxScore >= 2000) newLevel = 2;

  if (newLevel > currentLevel) {
    currentLevel = newLevel;
    let levelName = "";
    if (currentLevel === 2) levelName = "Level 2: 푸른 해질녘";
    if (currentLevel === 3) levelName = "Level 3: 별이 빛나는 밤";
    if (currentLevel === 4) levelName = "Level 4: 끝없는 우주";
    
    levelTexts.push(new LevelUpText(levelName));
  }
}

function triggerGameOver(x, y) {
  isDying = true;
  gameOverTimer = 90; // 1.5초 대기 (60fps 기준)
  
  // 파티클 생성 (캐릭터 색상과 흰색/빨간색 섞어서)
  for (let i = 0; i < 40; i++) {
    let colors = [player.color, '#ff7777', 'white', '#ffb6c1', '#333333'];
    let color = colors[Math.floor(Math.random() * colors.length)];
    particles.push(new Particle(x, y, color));
  }
}

function update() {
  if (isGameOver) return;

  if (isDying) {
    // 파티클 업데이트
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      if (particles[i].life <= 0) {
        particles.splice(i, 1);
      }
    }
    
    gameOverTimer--;
    if (gameOverTimer <= 0) {
      isGameOver = true;
      isPlaying = false;
      finalScoreText.innerText = `최종 점수: ${maxScore}`;
      gameOverText.style.display = 'block';
      restartBtn.style.display = 'block';
    }
    return; // isDying 중에는 플레이어/발판 업데이트 중지
  }

  player.update();

  for (let p of platforms) {
    p.update();
  }

  // 충돌 감지 (아래로 떨어질 때만)
  if (player.vy > 0) {
    for (let p of platforms) {
      if (
        !p.isBreaking && // 부서지는 중인 발판은 밟을 수 없음
        player.x + player.radius > p.x &&
        player.x - player.radius < p.x + p.width &&
        player.y + player.radius >= p.y &&
        player.y + player.radius <= p.y + p.height + player.vy
      ) {
        // 처음 밟는 발판일 경우 점수 텍스트 생성 및 점수 추가
        if (!p.touched) {
          p.touched = true;
          if (p.type === 'fragile') {
            p.isBreaking = true; // 부서지는 발판은 밟으면 바로 떨어지기 시작
            
            // 40% 확률로 함정 발동 (즉시 게임 오버)
            if (Math.random() < 0.4) {
              floatingTexts.push(new FloatingText(player.x, p.y - 10, "TRAP!", '#FF0000'));
              triggerGameOver(player.x, player.y);
              break; // 충돌 루프 종료 (점프 안 함)
            }
          }
          // 기존 높이 기반 점수 외에 발판 밟기 보너스 점수 추가
          score += p.scoreValue;
          if (score > maxScore) {
            maxScore = Math.floor(score);
            scoreDisplay.innerText = `점수: ${maxScore}`;
            checkLevelUp();
          }
          floatingTexts.push(new FloatingText(player.x, p.y - 10, p.scoreValue));
        }
        
        player.jump();
        break;
      }
    }
  }

  // 떠오르는 텍스트 업데이트
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].update();
    if (floatingTexts[i].life <= 0) {
      floatingTexts.splice(i, 1);
    }
  }

  // 카메라 스크롤 (캐릭터가 화면 중앙 위로 올라갈 때)
  if (player.y < height / 2) {
    let diff = height / 2 - player.y;
    player.y = height / 2;
    score += diff;
    
    if (score > maxScore) {
      maxScore = Math.floor(score);
      scoreDisplay.innerText = `점수: ${maxScore}`;
      checkLevelUp();
    }

    for (let p of platforms) {
      p.y += diff;
    }

    // 떠오르는 텍스트도 같이 스크롤
    for (let f of floatingTexts) {
      f.y += diff;
    }

    // 구름 패럴랙스 스크롤 적용
    for (let c of clouds) {
      c.y += diff * c.speedMultiplier;
      // 화면 아래로 사라진 구름은 위로 재배치
      if (c.y > height + 50) {
        c.y = -80;
        c.x = Math.random() * width;
      }
    }

    // 별 패럴랙스 스크롤 적용 (매우 느리게)
    if (currentLevel >= 3) {
      for (let s of backgroundStars) {
        s.y += diff * 0.05;
        if (s.y > height) {
          s.y = 0;
          s.x = Math.random() * width;
        }
      }
    }
  }

  // 별 반짝임 애니메이션 업데이트
  if (currentLevel >= 3) {
    for (let s of backgroundStars) {
      s.alpha += s.alphaChange;
      if (s.alpha <= 0.1) {
        s.alpha = 0.1;
        s.alphaChange *= -1;
      } else if (s.alpha >= 1) {
        s.alpha = 1;
        s.alphaChange *= -1;
      }
    }
  }

  // 레벨업 텍스트 업데이트
  for (let i = levelTexts.length - 1; i >= 0; i--) {
    levelTexts[i].update();
    if (levelTexts[i].life <= 0) {
      levelTexts.splice(i, 1);
    }
  }

  // 화면 아래로 사라진 발판 제거 및 새 발판 맨 위에 추가
  for (let i = platforms.length - 1; i >= 0; i--) {
    if (platforms[i].y > height) {
      platforms.splice(i, 1);
      
      // 현재 가장 높은 발판 찾기
      let highestPlatform = platforms[0];
      for (let p of platforms) {
        if (p.y < highestPlatform.y) {
          highestPlatform = p;
        }
      }
      
      // 가장 높은 발판을 기준으로 도달 가능한 다음 발판 생성
      let nextPos = calculateNextPlatform(highestPlatform.y, highestPlatform.x);
      platforms.push(new Platform(nextPos.x, nextPos.y));
    }
  }

  // 게임 오버 조건 (화면 아래로 떨어짐)
  if (player.y > height + player.radius) {
    triggerGameOver(player.x, height); // 화면 맨 아래에서 터지도록
  }
}

function drawBackground() {
  // 레벨에 따른 배경 그라데이션
  let gradient = ctx.createLinearGradient(0, 0, 0, height);
  if (currentLevel === 1) {
    gradient.addColorStop(0, '#87CEEB'); // 진한 하늘색
    gradient.addColorStop(1, '#e0f6ff'); // 연한 하늘색
  } else if (currentLevel === 2) {
    gradient.addColorStop(0, '#4B79A1'); // 푸른 해질녘 (위쪽 어두운 파랑)
    gradient.addColorStop(1, '#283E51'); // 푸른 해질녘 (아래쪽 짙은 남색)
  } else if (currentLevel === 3) {
    gradient.addColorStop(0, '#2B5876'); // 밤하늘 남색
    gradient.addColorStop(1, '#4E4376'); // 밤하늘 보라
  } else {
    gradient.addColorStop(0, '#000000'); // 우주 검정
    gradient.addColorStop(1, '#434343'); // 우주 회색
  }
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);

  // 별 그리기 (레벨 3 이상)
  if (currentLevel >= 3) {
    ctx.save();
    for (let s of backgroundStars) {
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 구름 그리기 (배경 뒤쪽)
  for (let c of clouds) {
    // 레벨이 높아질수록 구름 투명도 감소 (밤/우주 느낌)
    let originalOpacity = c.opacity;
    if (currentLevel === 3) c.opacity *= 0.5;
    if (currentLevel === 4) c.opacity *= 0.2;
    c.draw();
    c.opacity = originalOpacity;
  }
  
  // 모눈종이 패턴 (은은하게)
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 1;
  for(let i = 0; i < width; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
  }
  for(let i = 0; i < height; i += 40) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
  }
}

function draw() {
  drawBackground();
  
  for (let p of platforms) {
    p.draw();
  }
  
  if (!isDying && (!isGameOver || player.y <= height + player.radius)) {
    player.draw();
  }

  // 파티클 그리기 (게임 오버 시)
  for (let p of particles) {
    p.draw();
  }

  // 떠오르는 텍스트 그리기 (캐릭터보다 앞에 표시)
  for (let f of floatingTexts) {
    f.draw();
  }

  // 레벨업 텍스트 그리기
  for (let l of levelTexts) {
    l.draw();
  }
}

function loop() {
  if (isPlaying) {
    update();
    draw();
  }
  gameLoopId = requestAnimationFrame(loop);
}

// 키보드 조작 (PC 테스트용)
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') keys.left = true;
  if (e.key === 'ArrowRight') keys.right = true;
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

// 자이로센서 조작 (모바일용)
function handleOrientation(event) {
  let gamma = event.gamma; // -90 ~ 90
  if (gamma > 45) gamma = 45;
  if (gamma < -45) gamma = -45;
  tilt = gamma;
}

// 권한 요청 및 게임 시작
async function requestDeviceOrientation() {
  // iOS 13+ 권한 요청
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const permissionState = await DeviceOrientationEvent.requestPermission();
      if (permissionState === 'granted') {
        window.addEventListener('deviceorientation', handleOrientation);
      } else {
        alert('센서 권한이 거부되었습니다. 키보드로 플레이해주세요.');
      }
    } catch (error) {
      console.error(error);
      alert('센서 권한 요청 중 오류가 발생했습니다.');
    }
  } else {
    // 안드로이드 등 권한 요청이 필요 없는 기기
    window.addEventListener('deviceorientation', handleOrientation);
  }
}

startBtn.addEventListener('click', () => {
  requestDeviceOrientation();
  startBtn.style.display = 'none';
  initGame();
  isPlaying = true;
  if (!gameLoopId) loop();
});

restartBtn.addEventListener('click', () => {
  initGame();
});

// 초기 배경 그리기
drawBackground();
</script>
